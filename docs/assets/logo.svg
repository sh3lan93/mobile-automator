<svg viewBox="0 0 240 240" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Phone gradient: bright green → darker green -->
    <linearGradient id="phoneGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22C55E;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#16A34A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0F2A1A;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Speed lines (motion effect) -->
  <g opacity="0.4">
    <rect x="30" y="75" width="35" height="3" rx="1.5" fill="#22C55E" transform="rotate(15 48 76.5)" />
    <rect x="25" y="95" width="28" height="2.5" rx="1.5" fill="#22C55E" transform="rotate(15 39 96.25)" opacity="0.65" />
    <rect x="35" y="115" width="20" height="2" rx="1.5" fill="#22C55E" transform="rotate(15 45 116)" opacity="0.4" />
  </g>

  <!-- Star dots (decorative) -->
  <circle cx="200" cy="35" r="3" fill="#22C55E" opacity="0.8" />
  <circle cx="20" cy="50" r="2" fill="#4ADE80" opacity="0.5" />
  <circle cx="210" cy="110" r="2.5" fill="#4ADE80" opacity="0.6" />

  <!-- Phone body with gradient fill and tilt -->
  <g transform="translate(120, 95) rotate(15)">
    <!-- Main phone rectangle -->
    <rect x="-60" y="-85" width="120" height="170" rx="24" fill="url(#phoneGradient)" />

    <!-- Phone screen detail -->
    <rect x="-53" y="-65" width="96" height="120" rx="14" fill="#0D0D0D" opacity="0.1" />

    <!-- Phone notch -->
    <rect x="-18" y="-75" width="36" height="4" rx="2" fill="#1A1A2E" opacity="0.3" />

    <!-- Home indicator -->
    <rect x="-17" y="79" width="34" height="4" rx="2" fill="#1A1A2E" opacity="0.3" />
  </g>

  <!-- Massive Sparkle Icon (centered in phone, tilted) -->
  <g transform="translate(120, 95) rotate(15)">
    <!-- Single massive sparkle star -->
    <path d="M 0 -18 L 4.5 -5 L 18 0 L 4.5 5 L 0 18 L -4.5 5 L -18 0 L -4.5 -5 Z" fill="#FFFFFF" />
  </g>
</svg>

<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <!-- Define gradients -->
  <defs>
    <linearGradient id="faviconGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22C55E;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16A34A;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Outer gradient circle background -->
  <circle cx="32" cy="32" r="32" fill="url(#faviconGrad)"/>

  <!-- Subtle background ring -->
  <circle cx="32" cy="32" r="30" fill="none" stroke="#FFFFFF" stroke-width="0.5" opacity="0.2"/>

  <!-- Simplified rocket icon in center -->
  <g transform="translate(32, 20)">
    <!-- Rocket body -->
    <path d="M -4 -6 L 0 -12 L 4 -6 L 3 6 L -3 6 Z" fill="#FFFFFF" />

    <!-- Rocket flame/trail -->
    <path d="M -1.5 6 L -1 11 L 0 7 L 1 11 L 1.5 6 Z" fill="#FFFFFF" opacity="0.85" />

    <!-- Rocket window -->
    <circle cx="0" cy="-4" r="1.2" fill="#22C55E" />
  </g>

  <!-- Decorative accent dots -->
  <circle cx="50" cy="32" r="1.5" fill="#FFFFFF" opacity="0.7"/>
  <circle cx="18" cy="32" r="1.2" fill="#FFFFFF" opacity="0.5"/>
  <circle cx="32" cy="50" r="1.5" fill="#FFFFFF" opacity="0.6"/>
</svg>
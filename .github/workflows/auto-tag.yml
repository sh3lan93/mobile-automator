name: Auto Tag on Merge

on:
  push:
    branches:
      - main

jobs:
  create-tag:
    name: Create version tag
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Required to push tags

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Required to fetch all existing tags

      - name: Read version from gemini-extension.json
        id: get_version
        run: |
          VERSION=$(jq -r '.version' gemini-extension.json)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=v$VERSION" >> $GITHUB_OUTPUT
          echo "Detected version: $VERSION (tag: v$VERSION)"

      - name: Check if tag already exists
        id: tag_check
        run: |
          TAG="${{ steps.get_version.outputs.tag }}"
          git fetch --tags

          if git rev-parse "$TAG" > /dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "⚠️ Tag $TAG already exists — skipping tag creation."
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "✅ Tag $TAG does not exist — will create it."
          fi

      - name: Create and push tag
        if: steps.tag_check.outputs.exists == 'false'
        run: |
          TAG="${{ steps.get_version.outputs.tag }}"
          VERSION="${{ steps.get_version.outputs.version }}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git tag -a "$TAG" -m "Release $TAG"
          git push origin "$TAG"

          echo ""
          echo "🏷️ Tag created and pushed"
          echo "────────────────────────────────────────"
          echo "  Tag:     $TAG"
          echo "  Version: $VERSION"
          echo "  Commit:  ${{ github.sha }}"
          echo "────────────────────────────────────────"

name: Lint Prompts (Vale)

on:
  pull_request:
    branches: [main]
    paths:
      - 'templates/**'
      - 'commands/**'
      - 'GEMINI.md'
      - '.vale.ini'
      - '.vale/**'
      - '.github/workflows/lint-prompts.yml'
  push:
    branches: [main]
    paths:
      - 'templates/**'
      - 'commands/**'
      - 'GEMINI.md'
      - '.vale.ini'
      - '.vale/**'
      - '.github/workflows/lint-prompts.yml'

jobs:
  vale:
    name: Vale prompt-hygiene check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Scoping is configured in .vale.ini via path globs - PromptHygiene
      # only attaches to templates/**/*.md, commands/**/*.toml, and
      # GEMINI.md. Human-facing docs are scanned but unscoped, so they
      # never produce errors. Running on '.' (default) keeps CI and
      # pre-commit behavior identical.
      - name: Run Vale
        uses: errata-ai/vale-action@v2
        with:
          version: 3.14.1
          fail_on_error: true
          reporter: github-pr-check
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

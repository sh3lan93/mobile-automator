name: Sample App E2E — Android

on:
  pull_request:
    paths:
      - 'sample-app/**'
      - 'src/guide/content/execute.*.md'
      - 'src/**'
      - '.github/workflows/sample-app-e2e-android.yml'
  workflow_dispatch: {}

jobs:
  smoke-android:
    name: Android emulator smoke (API 33)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.35.6'
          channel: stable
          cache: true

      - name: Build debug APK
        working-directory: sample-app
        run: |
          flutter pub get
          flutter build apk --debug

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: sample-app/scripts/package-lock.json

      - name: Install smoke runner deps
        working-directory: sample-app/scripts
        run: npm ci

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run smoke scenario on Android emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 33
          arch: x86_64
          target: default
          disable-animations: true
          emulator-boot-timeout: 300
          script: |
            adb install sample-app/build/app/outputs/flutter-apk/app-debug.apk
            node sample-app/scripts/run-smoke.mjs

      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-screenshots-android
          path: sample-app/screenshots/smoke_nav/
          if-no-files-found: warn

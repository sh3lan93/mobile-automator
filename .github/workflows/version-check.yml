name: Version Check

on:
  pull_request:
    branches:
      - main

jobs:
  check-docs-only:
    name: Detect file changes
    runs-on: ubuntu-latest
    outputs:
      is-docs-only: ${{ steps.check.outputs.docs-only }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check if only docs files changed
        id: check
        run: |
          # Get list of changed files in this PR
          CHANGED_FILES=$(git diff --name-only origin/main...HEAD)

          # Files that are NOT docs/website related
          EXTENSION_FILES=$(echo "$CHANGED_FILES" | grep -v -E '^(docs/|\.github/workflows/docs\.yml|\.github/workflows/version-check\.yml|mkdocs\.yml|site/|mobile-automator\.pen|requirements\.txt|\.mcp\.json|squirrel\.toml)' || true)

          if [ -z "$EXTENSION_FILES" ]; then
            echo "docs-only=true" >> $GITHUB_OUTPUT
            echo "✅ Only documentation files changed - version check skipped"
          else
            echo "docs-only=false" >> $GITHUB_OUTPUT
            echo "⚠️ Extension files changed - version check required"
            echo ""
            echo "Files that require version bump:"
            echo "$EXTENSION_FILES"
          fi

  check-version:
    name: Verify version is bumped
    needs: check-docs-only
    runs-on: ubuntu-latest
    if: needs.check-docs-only.outputs.is-docs-only == 'false'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Required to fetch all tags

      - name: Read version from gemini-extension.json
        id: get_version
        run: |
          VERSION=$(jq -r '.version' gemini-extension.json)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=v$VERSION" >> $GITHUB_OUTPUT
          echo "Detected version: $VERSION (tag: v$VERSION)"

      - name: Check version is not already tagged
        run: |
          VERSION="${{ steps.get_version.outputs.version }}"
          TAG="${{ steps.get_version.outputs.tag }}"

          # Fetch all remote tags
          git fetch --tags

          if git rev-parse "$TAG" > /dev/null 2>&1; then
            echo ""
            echo "❌ Version check failed"
            echo "────────────────────────────────────────"
            echo "  Version $VERSION is already released (tag '$TAG' exists)."
            echo ""
            echo "  PRs with extension code changes must bump the version in"
            echo "  gemini-extension.json to a value not yet in the tags."
            echo ""
            echo "  Current tags:"
            git tag --sort=-version:refname | head -10
            echo "────────────────────────────────────────"
            exit 1
          else
            echo ""
            echo "✅ Version check passed"
            echo "────────────────────────────────────────"
            echo "  Version $VERSION (tag '$TAG') is not yet released."
            echo "  This PR is clear to merge."
            echo "────────────────────────────────────────"
          fi

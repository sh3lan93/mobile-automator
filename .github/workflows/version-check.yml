name: Version Check

on:
  pull_request:
    branches:
      - main

jobs:
  detect-cli-changes:
    name: Detect CLI code changes
    runs-on: ubuntu-latest
    outputs:
      ships-code: ${{ steps.filter.outputs.cli }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Filter changed paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          base: ${{ github.event.pull_request.base.ref }}
          filters: |
            cli:
              - 'src/**'
              - 'bin/**'
              - 'tools/**'
              - 'package.json'

      - name: Report decision
        run: |
          if [[ "${{ steps.filter.outputs.cli }}" == "true" ]]; then
            echo "⚠️ CLI code changed - version bump required"
          else
            echo "✅ No CLI code changes - version check skipped"
          fi

  check-version:
    name: Verify version is bumped
    needs: detect-cli-changes
    runs-on: ubuntu-latest
    if: needs.detect-cli-changes.outputs.ships-code == 'true'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Required to fetch all tags

      - name: Read version from package.json
        id: get_version
        run: |
          VERSION=$(jq -r '.version' package.json)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=v$VERSION" >> $GITHUB_OUTPUT
          echo "Detected version: $VERSION (tag: v$VERSION)"

      - name: Check version is not already tagged
        run: |
          VERSION="${{ steps.get_version.outputs.version }}"
          TAG="${{ steps.get_version.outputs.tag }}"

          # Fetch all remote tags
          git fetch --tags

          if git rev-parse "$TAG" > /dev/null 2>&1; then
            echo ""
            echo "❌ Version check failed"
            echo "────────────────────────────────────────"
            echo "  Version $VERSION is already released (tag '$TAG' exists)."
            echo ""
            echo "  PRs that change CLI code must bump the version in"
            echo "  package.json to a value not yet in the tags."
            echo ""
            echo "  CLI code paths:"
            echo "    src/, bin/, tools/, package.json"
            echo ""
            echo "  Current tags:"
            git tag --sort=-version:refname | head -10
            echo "────────────────────────────────────────"
            exit 1
          else
            echo ""
            echo "✅ Version check passed"
            echo "────────────────────────────────────────"
            echo "  Version $VERSION (tag '$TAG') is not yet released."
            echo "  This PR is clear to merge."
            echo "────────────────────────────────────────"
          fi

name: Validate Schemas

on:
  pull_request:
    branches:
      - main
    paths:
      - 'templates/**/references/*.json'
      - 'sample-app/mobile-automator/scenarios/**'
      - 'sample-app/mobile-automator/results/**'
      - '.github/workflows/validate-schemas.js'
  push:
    branches:
      - main
    paths:
      - 'templates/**/references/*.json'
      - 'sample-app/mobile-automator/scenarios/**'
      - 'sample-app/mobile-automator/results/**'
      - '.github/workflows/validate-schemas.js'

jobs:
  validate-schemas:
    name: Validate JSON schemas and prototype scenarios
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install ajv ajv-formats

      - name: Validate schemas and prototypes
        run: node .github/workflows/validate-schemas.js

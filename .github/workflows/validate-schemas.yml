name: Validate Schemas

on:
  pull_request:
    branches:
      - main
    paths:
      - 'templates/**/references/*.json'
      - 'prototypes/*.json'
  push:
    branches:
      - main
    paths:
      - 'templates/**/references/*.json'
      - 'prototypes/*.json'

jobs:
  validate-schemas:
    name: Validate JSON schemas and prototype scenarios
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install ajv-cli
        run: npm install -g ajv-cli ajv-formats

      - name: Validate schema files are valid JSON
        run: |
          echo "Checking JSON validity of schema files..."
          echo ""

          ERRORS=0

          for FILE in \
            templates/mobile-automator-generator/references/scenario_schema_v2.json \
            templates/mobile-automator-generator/references/scenario_schema.json \
            templates/mobile-automator-executor/references/result_schema.json; do

            if [ ! -f "$FILE" ]; then
              echo "⚠️  Skipped (not found): $FILE"
              continue
            fi

            if jq empty "$FILE" 2>/dev/null; then
              echo "✅ Valid JSON: $FILE"
            else
              echo "❌ Invalid JSON: $FILE"
              ERRORS=$((ERRORS + 1))
            fi
          done

          echo ""
          if [ $ERRORS -gt 0 ]; then
            echo "────────────────────────────────────────"
            echo "  ❌ $ERRORS schema file(s) have invalid JSON"
            echo "────────────────────────────────────────"
            exit 1
          else
            echo "────────────────────────────────────────"
            echo "  ✅ All schema files are valid JSON"
            echo "────────────────────────────────────────"
          fi

      - name: Validate JSON Schema Draft-07 syntax
        run: |
          echo "Validating that schema files are valid JSON Schema Draft-07..."
          echo ""

          ERRORS=0

          for SCHEMA in \
            templates/mobile-automator-generator/references/scenario_schema_v2.json \
            templates/mobile-automator-executor/references/result_schema.json; do

            if [ ! -f "$SCHEMA" ]; then
              echo "⚠️  Skipped (not found): $SCHEMA"
              continue
            fi

            if ajv compile -s "$SCHEMA" --spec=draft7 --allow-union-types 2>/dev/null; then
              echo "✅ Valid JSON Schema: $SCHEMA"
            else
              echo "❌ Invalid JSON Schema: $SCHEMA"
              ERRORS=$((ERRORS + 1))
            fi
          done

          echo ""
          if [ $ERRORS -gt 0 ]; then
            echo "────────────────────────────────────────"
            echo "  ❌ $ERRORS schema(s) failed Draft-07 validation"
            echo "────────────────────────────────────────"
            exit 1
          else
            echo "────────────────────────────────────────"
            echo "  ✅ All schemas are valid JSON Schema Draft-07"
            echo "────────────────────────────────────────"
          fi

      - name: Validate prototype scenarios against schema v2
        run: |
          echo "Validating prototype scenarios against scenario_schema_v2.json..."
          echo ""

          SCHEMA="templates/mobile-automator-generator/references/scenario_schema_v2.json"
          ERRORS=0

          for SCENARIO in prototypes/scenario-*-ideal.json; do
            if [ ! -f "$SCENARIO" ]; then
              echo "⚠️  No prototype scenario files found"
              break
            fi

            BASENAME=$(basename "$SCENARIO")
            if ajv validate -s "$SCHEMA" -d "$SCENARIO" --spec=draft7 --allow-union-types 2>/dev/null; then
              echo "✅ Valid: $BASENAME"
            else
              echo "❌ Invalid: $BASENAME"
              echo "   Run locally: ajv validate -s $SCHEMA -d $SCENARIO --spec=draft7"
              ERRORS=$((ERRORS + 1))
            fi
          done

          echo ""
          if [ $ERRORS -gt 0 ]; then
            echo "────────────────────────────────────────"
            echo "  ❌ $ERRORS prototype(s) failed schema validation"
            echo "────────────────────────────────────────"
            exit 1
          else
            echo "────────────────────────────────────────"
            echo "  ✅ All prototype scenarios conform to schema v2"
            echo "────────────────────────────────────────"
          fi

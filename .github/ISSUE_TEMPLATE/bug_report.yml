name: 🐛 Bug Report
description: Report a bug or issue with Mobile Automator
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill out the information below to help us resolve the issue.

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear and concise description of what the bug is.
      placeholder: Describe the bug...
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Detailed steps to reproduce the behavior
      placeholder: |
        1. Run `/mobile-automator:setup` in a React Native project
        2. Answer the setup questions
        3. Observe the error...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What you expected to happen
      placeholder: Setup should detect React Native from package.json
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened
      placeholder: Setup fails with "Platform could not be detected"
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Mobile Automator Version
      description: What version of Mobile Automator are you using?
      placeholder: "v0.1.0"
    validations:
      required: true

  - type: input
    id: gemini-version
    attributes:
      label: Gemini CLI Version
      description: Run `gemini --version` to find this
      placeholder: "1.0.0"
    validations:
      required: true

  - type: dropdown
    id: platform
    attributes:
      label: Mobile Platform
      description: What mobile platform is your project using?
      options:
        - Android (Gradle)
        - iOS (Xcode)
        - Flutter
        - React Native
        - Kotlin Multiplatform (KMP)
        - Compose Multiplatform (CMP)
        - Other
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating System
      description: What OS are you running Gemini CLI on?
      options:
        - macOS
        - Linux
        - Windows
    validations:
      required: true

  - type: textarea
    id: config
    attributes:
      label: Setup Configuration
      description: |
        If setup completed, paste the contents of `mobile-automator/config.json` here.
        **Remove any sensitive data (package IDs, app names) before pasting.**
      placeholder: |
        {
          "platform": "react-native",
          "environments": ["staging", "production"],
          ...
        }
      render: json

  - type: textarea
    id: logs
    attributes:
      label: Logs / Screenshots
      description: |
        Paste any error messages, logs, or attach screenshots.
        Tip: You can attach images by dragging and dropping them here.
      placeholder: Paste logs or error messages here...

  - type: checkboxes
    id: checklist
    attributes:
      label: Pre-submission Checklist
      description: Please confirm the following before submitting
      options:
        - label: I have searched existing issues to avoid duplicates
          required: true
        - label: I have tested this with the latest version of Mobile Automator
          required: true
        - label: I have included all required information above
          required: true

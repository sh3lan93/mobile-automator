name: ✨ Feature Request
description: Suggest a new feature or enhancement for Mobile Automator
title: "[Feature]: "
labels: ["enhancement", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a feature! We appreciate your input in making Mobile Automator better.

  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: What problem does this feature solve? Why would this be useful?
      placeholder: |
        I'm frustrated when...
        It would be helpful if...
        Many QA engineers need...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe how you envision this feature working
      placeholder: |
        The feature should...
        When I run /mobile-automator:..., it should...
        The expected behavior is...
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: What alternatives or workarounds have you considered?
      placeholder: |
        Currently, I work around this by...
        Other tools solve this with...

  - type: dropdown
    id: category
    attributes:
      label: Feature Category
      description: What area does this feature relate to?
      options:
        - Platform Support (new platform/framework)
        - Test Generation (recording, scenarios)
        - Test Execution (replaying, validation)
        - Setup/Configuration
        - Assertions/Validations
        - Documentation
        - CI/CD Integration
        - Performance
        - Other
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: Priority (Your Opinion)
      description: How important is this feature to you?
      options:
        - Critical - Blocking my workflow
        - High - Would significantly improve my workflow
        - Medium - Nice to have
        - Low - Minor improvement
    validations:
      required: true

  - type: textarea
    id: examples
    attributes:
      label: Examples / Mockups
      description: |
        Provide code examples, mockups, or references to similar features in other tools.
        Tip: You can attach images by dragging and dropping them here.
      placeholder: |
        ```bash
        # Example usage:
        > /mobile-automator:new-feature
        ```

  - type: textarea
    id: use-case
    attributes:
      label: Use Case / User Story
      description: Describe a real-world scenario where this feature would be valuable
      placeholder: |
        As a mobile QA engineer,
        I want to...
        So that I can...

  - type: checkboxes
    id: contribution
    attributes:
      label: Contribution
      description: Would you be willing to help implement this feature?
      options:
        - label: I would be willing to submit a pull request for this feature
          required: false

  - type: checkboxes
    id: checklist
    attributes:
      label: Pre-submission Checklist
      description: Please confirm the following before submitting
      options:
        - label: I have searched existing issues/PRs to avoid duplicates
          required: true
        - label: This feature aligns with Mobile Automator's goals (mobile QA automation)
          required: true

StylesPath = .vale/styles
MinAlertLevel = error

# Treat .toml files as plain text so Vale scans prompt blocks.
# (TOML is not a native Vale format; aliasing to txt makes it lintable.)
[formats]
toml = txt

# PromptHygiene applies ONLY to AI-prompt files: the CLI guide prose
# under src/guide/content/. Human-facing docs (README, CHANGELOG,
# CLAUDE.md, docs/, CONTRIBUTING.md) keep their existing typography and
# are intentionally not linted.

[src/guide/content/**/*.md]
BasedOnStyles = PromptHygiene

site_name: mobile-automator
site_description: Intelligent mobile QA automation for Gemini CLI
site_url: https://sh3lan93.github.io/mobile-automator/
repo_url: https://github.com/sh3lan93/mobile-automator
repo_name: sh3lan93/mobile-automator
edit_uri: edit/main/docs/

# Versioning
version:
  provider: mike
  default: latest

theme:
  name: material
  logo: assets/logo.svg
  favicon: assets/favicon.svg
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: custom
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate

extra_css:
  - stylesheets/extra.css

plugins:
  - search

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed
  - pymdownx.highlight
  - pymdownx.inlinehilite
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Getting Started:
      - Overview: getting-started/index.md
      - Installation: getting-started/installation.md
      - Quick Start: getting-started/quick-start.md
  - Core Concepts:
      - Overview: concepts/index.md
      - Architecture: concepts/architecture.md
      - 3-Tier Design: concepts/three-tier-design.md
      - How Skills Work: concepts/skills.md
  - Guides:
      - Overview: guides/index.md
      - Setup Command: guides/setup.md
      - Generate Command: guides/generate.md
      - Execute Command: guides/execute.md
      - Migrate Command: guides/migrate.md
  - Reference:
      - Overview: reference/index.md
      - Assertion Types: reference/assertions.md
      - Test Scenario Schema v2: reference/schema-v2.md
      - Test Result Schema: reference/result-schema.md
      - MCP Tools: reference/mcp-tools.md
  - Examples:
      - Overview: examples/index.md
      - Android Examples: examples/android.md
      - iOS Examples: examples/ios.md
  - FAQ & Troubleshooting: faq.md
  - Contributing: contributing.md
  - Changelog: changelog.md

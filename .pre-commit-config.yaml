repos:
  - repo: local
    hooks:
      - id: vale-prompt-hygiene
        name: Vale (prompt hygiene)
        description: Lints prompt files for forbidden characters (smart quotes, NBSP, zero-width, section sign).
        language: system
        entry: vale
        args: ['--config=.vale.ini']
        files: '^src/guide/content/.*\.md$'
        types_or: [markdown]
        require_serial: true

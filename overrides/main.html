{% extends "base.html" %}

{% block extrahead %}
  {% if page %}
  <!-- Open Graph -->
  <meta property="og:type" content="website" />
  <meta property="og:title" content="{{ page.meta.get('title', page.title) }} - {{ config.site_name }}" />
  <meta property="og:description" content="{{ page.meta.get('description', config.site_description) }}" />
  <meta property="og:url" content="{{ page.canonical_url }}" />
  <meta property="og:site_name" content="{{ config.site_name }}" />
  <meta property="og:image" content="{{ config.site_url }}assets/logo.svg" />

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary" />
  <meta name="twitter:title" content="{{ page.meta.get('title', page.title) }} - {{ config.site_name }}" />
  <meta name="twitter:description" content="{{ page.meta.get('description', config.site_description) }}" />
  <meta name="twitter:image" content="{{ config.site_url }}assets/logo.svg" />
  {% endif %}
{% endblock %}

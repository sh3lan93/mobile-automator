   - generate-test
   - run-test

đź”„ **ACTION REQUIRED**: Run the command below to activate your new skills:
   /skills reload

đźš€ Once reloaded, you can use:
   /generate-test \"feature description\"
   /run-test testscenarios/test.json
```

**IMPORTANT**: Replace all placeholders [APP_NAME], [PLATFORM], [TECH_STACK], [PACKAGE_ID] with actual detected values in the generated skill files.
"""

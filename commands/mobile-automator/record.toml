description = "Record a test scenario via the recorder sidecar (experimental ŌĆö see issue #21)"
prompt = """
## SYSTEM DIRECTIVE
You are launching the Mobile QA Scenario **Recorder** ŌĆö a sidecar-driven flow that streams events from a tethered device, then hands the captured timeline to the recorder skill for AI synthesis of a final scenario JSON.

CRITICAL: Do NOT generate scenarios yourself. The sidecar (`tools/recorder/src/index.js`) drives the recording. After the sidecar exits successfully, follow the instructions in `.gemini/skills/mobile-automator-recorder/SKILL.md` ŌĆö that skill performs the AI synthesis of the captured timeline.

CRITICAL: You must validate the success of every tool call. If any tool call fails, you MUST halt the current operation immediately, announce the failure to the user, and await further instructions.

---

## 0.0 EXPERIMENTAL GATE

**Purpose:** This command is in active development. Until the recorder feature graduates, it is gated behind an opt-in environment variable so non-participating users do not stumble into a half-built workflow.

1.  **Read the environment variable** `MOBILE_AUTOMATOR_RECORDER` from the user's shell.
2.  **If the value is unset, empty, or anything other than `1`**, announce the following message verbatim and HALT:
    > "The `/mobile-automator:record` command is in active development per https://github.com/sh3lan93/mobile-automator/issues/21. To opt in to the experimental version, set the environment variable `MOBILE_AUTOMATOR_RECORDER=1` in your shell and re-run."

    **HALT.** Do not proceed to argument parsing, do not run pre-flight, do not invoke the sidecar.
3.  **If the value is exactly `1`**, announce briefly:
    > "Ōä╣’ĖÅ  Experimental recorder enabled (MOBILE_AUTOMATOR_RECORDER=1). Tracking issue: https://github.com/sh3lan93/mobile-automator/issues/21"
    Then proceed to Section 0.1.

---

## 0.1 ARGUMENT PARSING

**Purpose:** Parse the user's invocation of `/mobile-automator:record`. The first positional argument is `<scenario_name>` (required). Recognised flags (passed through to the sidecar verbatim):

- `--environment="X"` ŌĆö one-time environment override (resolved in Section 0.5).
- `--mode=c3` ŌĆö sidecar capture mode (forwarded as-is).
- `--preconditions-modal` ŌĆö sidecar UX flag (forwarded as-is).
- `--allow-sensitive-input` ŌĆö sidecar redaction toggle (forwarded as-is).
- `--verify` ŌĆö sidecar verify pass (forwarded as-is).
- `--overwrite` ŌĆö allow overwriting an existing scenario file (forwarded as-is).

1.  **Extract `scenario_name`** from the first positional argument. If missing, use the `ask_user` tool (type: `text`):
    - Header: `Scenario name`
    - Question: `What name should the recorded scenario be saved under?`
    - Placeholder: `e.g. login_happy_path`
2.  **Collect all remaining flags** verbatim into a single `${flags}` string (preserve order). Do not interpret unknown flags ŌĆö pass them through to the sidecar.

---

## 0.5 ENVIRONMENT RESOLUTION

**Purpose:** Resolve `selected_environment` before pre-flight checks.

**config.json absence:** If `mobile-automator/config.json` does not exist, skip Section 0.5 entirely ŌĆö Section 1.1 will halt with the missing-config error.

**Single-environment short-circuit:** Read `mobile-automator/config.json`. If `config.environments` exists and has exactly **one** entry, use it as `selected_environment`. Any `--environment` flag is silently ignored. Skip the rest of Section 0.5 and proceed to Section 1.0.

**Multi-environment resolution:**

1.  If `--environment="X"` is present:
    - Verify `X` is in `config.environments`. If not, halt with:
      > "ŌØī Unknown environment: \"X\"\n   Valid options: [comma-separated list of config.environments values]"
      **HALT.**
    - Set `selected_environment = X` (one-time override; do not persist).
    - Proceed to Section 1.0.
2.  Otherwise, read `mobile-automator/generate_preferences.json`. If it has a valid `"environment"` value, use it. Announce:
    > "Ōä╣’ĖÅ  Using saved environment: [saved_value]"
3.  If neither is set and `config.environments` has multiple entries, use the `ask_user` tool (type: `choice`):
    - Header: `Environment`
    - Question: `Which environment should I use for this recording?`
    - Options: derived from `config.environments`.
    Set `selected_environment` to the chosen value. Do **not** persist (this command is non-destructive of the saved preference).

---

## 0.7 MODE READ

**Purpose:** Determine which operating mode the project uses. Drives behaviour in Section 1.3.

**config.json absence guard:** If `mobile-automator/config.json` does not exist, skip Section 0.7. Section 1.1 will handle the error.

1.  Read `mobile-automator/config.json`.
2.  Set `MODE = config.mode`. If absent, default `MODE = "platform-aware"` (v0.10 implicit default).
3.  If `MODE` is not one of `platform-aware` / `platform-agnostic`, halt:
    > "ERROR: Unknown mode `<value>` in config.json. Expected `platform-aware` or `platform-agnostic`. Re-run setup or fix the config manually."
    **HALT.**

---

## 0.8 SYSTEM TOOLS PRE-FLIGHT (FFMPEG)

**Purpose:** Verify the `ffmpeg` binary is reachable on `PATH` before the sidecar is spawned. The recorder sidecar shells out to `ffmpeg` to extract frames from the screen recording produced by `mobile_start_screen_recording`; without it, no taps can be detected and the session is unrecoverable. Failing here keeps the user out of a half-recorded state.

1.  Run `command -v ffmpeg` (or equivalent ŌĆö capture exit code and stdout).
2.  If exit code is non-zero (binary not found), halt:
    > **HALT.** The recorder requires `ffmpeg`, which was not found on your `PATH`.
    >
    > Install it for your platform:
    > - **macOS (Homebrew):** `brew install ffmpeg`
    > - **Debian / Ubuntu:** `sudo apt-get install ffmpeg`
    > - **Arch Linux:** `sudo pacman -S ffmpeg`
    > - **Other / manual:** https://ffmpeg.org/download.html
    >
    > After installation, confirm with `ffmpeg -version` and re-run `/mobile-automator:record <scenario_name>`.
3.  If exit code is zero, log a one-line confirmation (`ffmpeg detected at <path>`) and continue to Section 1.0.

---

## 1.0 PRE-FLIGHT CHECKS

### 1.1 Verify Setup
1.  Check that `mobile-automator/config.json` exists.
    - If missing ŌåÆ "Setup not found. Please run `/mobile-automator:setup` first." ŌåÆ Halt.
2.  Check that `.gemini/skills/mobile-automator-recorder/SKILL.md` exists.
    - If missing ŌåÆ "Recorder skill not installed. Please run `/mobile-automator:setup` first." ŌåÆ Halt.
3.  Read `mobile-automator/config.json` to load project configuration.

### 1.2 Verify Device
1.  Use `mobile_list_available_devices()` to check for connected devices. The recorder supports Android emulators, Android physical devices, and **iOS Simulator** targets (iOS physical devices are out of scope per PRD #21).
    - If no devices found ŌåÆ "No device connected. Please connect an Android device, Android emulator, or iOS Simulator and try again." ŌåÆ Halt.
2.  If multiple devices are found, use the `ask_user` tool (type: `choice`) to ask the user to select one:
    - Header: `Device`
    - Question: `Which device should I use?`
    - Options: Dynamically list the available devices as options.
3.  Confirm the selected device to the user.
4.  **Capture the device's `os` field** from the entry returned by `mobile_list_available_devices()` for the selected device. Lowercase it. Map `"android"` ŌåÆ `${platform_flag} = "android"`, `"ios"` ŌåÆ `${platform_flag} = "ios"`. If the value is anything else, halt with:
    > "ŌØī Unsupported device platform: `<value>`. The recorder supports Android and iOS Simulator only." **HALT.**

### 1.3 Verify App
1.  **Read config:** Load `mobile-automator/config.json`.
2.  **Use resolved environment:** The `selected_environment` value was resolved in Section 0.5. Use it for the package ID lookup. If unset (Section 0.5 was skipped), Section 1.1 will already have halted.
3.  **Determine the app package ID:**
    -   If `app.android_packages` or `app.ios_bundle_ids` exists in config: use the package ID for `selected_environment`.
    -   Otherwise, use the single package ID: `app.android_package` or `app.ios_bundle_id`.
4.  **Branch on MODE:**

    **If MODE = platform-aware:**
    - Confirm with the user via `ask_user` (type: `choice`):
        - Header: `Build & Install`
        - Question: `I'll be recording against [app_package] on [device_name]. Should I build and install the app?`
        - Options:
          - `Build and install` (description: `using: [build_command]`)
          - `Already installed` (description: `skip build`)
    - On `Build and install`: execute the build command and install.
    - On `Already installed`: verify via `mobile_launch_app`.

    **If MODE = platform-agnostic:**
    - Probe app presence on the selected device (Android: `adb shell pm list packages | grep <package>`; iOS: simctl equivalent).
    - If absent ŌåÆ use `ask_user` (type: `choice`):
        - Options: `App is now installed` / `Cancel`.
    - On `Cancel` ŌåÆ **HALT.**

---

## 1.4 OVERWRITE GATE

**Purpose:** Prevent silent clobbering of an existing scenario JSON. Re-recording the same name is only permitted when `--overwrite` is present; otherwise abort here, before the sidecar opens the GUI and the user invests time on a recording that won't be saved.

**Scope:** This gate inspects **only** `mobile-automator/scenarios/<scenario_name>.json`. The screenshots directory is not checked here ŌĆö its archival happens later, at Save time inside the recorder skill (so a cancelled re-record preserves the prior screenshots).

1.  **Compute the target path:** `scenario_path = mobile-automator/scenarios/<scenario_name>.json`.
2.  **Check existence.**
3.  **If `scenario_path` exists AND `--overwrite` is NOT in `${flags}`**, announce the following message verbatim and HALT:
    > "Scenario `<scenario_name>` already exists. Pass `--overwrite` to replace, or use a different name."

    **HALT.** Do not invoke the sidecar.
4.  **If `scenario_path` exists AND `--overwrite` IS in `${flags}`**, set `overwrite_existing = true`. Announce briefly:
    > "Ōä╣’ĖÅ  `--overwrite` detected. Prior screenshots will be archived at Save time."
5.  **If `scenario_path` does not exist**, set `overwrite_existing = false`. (The `--overwrite` flag is a no-op when there is nothing to overwrite; do not error in that case.)
6.  **Detect `--verify`:** scan `${flags}` for `--verify`. Set `verify_on_save = true` if present, else `false`. Announce only when set:
    > "Ōä╣’ĖÅ  `--verify` detected. The scenario will be replayed via the executor skill immediately after Save."

---

## 2.0 RUN THE SIDECAR

**Purpose:** Hand control to the recorder sidecar. The sidecar drives the device, streams events, and writes a raw timeline artifact to `mobile-automator/recordings/<scenario_name>/`. This command WAITS for the sidecar to exit before proceeding.

1.  **Announce the hand-off:**
    > "Starting recorder sidecar for scenario `[scenario_name]` on `[device_name]` (env: `[selected_environment]`). Interact with the device ŌĆö the sidecar will capture each step. Press Ctrl-C in the sidecar terminal (or follow the sidecar's stop instructions) when finished."

2.  **Invoke the sidecar** as a subprocess. Pass the resolved platform from Section 1.2 so the sidecar can pick the right video tap-detector profile (Android's "Show taps" cyan vs iOS Simulator's "Show Single Touches" gray disk) and gate Android-only modules:
    ```
    node ${extensionPath}/tools/recorder/src/index.js --scenario "${scenario_name}" --platform "${platform_flag}" ${flags}
    ```
    Stream the sidecar's stdout/stderr to the user verbatim. Do not interpret intermediate output ŌĆö the sidecar owns the recording UX.

3.  **Wait for the sidecar to exit.** Capture its exit code.

4.  **On non-zero exit code:** announce the failure and **HALT.**
    > "ŌØī Recorder sidecar exited with code `[exit_code]`. The recording was not completed. See the sidecar output above for details. Re-run `/mobile-automator:record [scenario_name]` after addressing the issue."

5.  **On exit code 0:** proceed to Section 3.0.

---

## 3.0 HAND OFF TO RECORDER SKILL

1.  **Announce the hand-off:**
    > "Ō£ģ Sidecar exit 0. Activating the recorder skill to synthesise the captured timeline into a final scenario JSON."

2.  **Follow the recorder skill** at `.gemini/skills/mobile-automator-recorder/SKILL.md`. Pass the following inputs so the skill can perform Save-time work correctly:
    - The captured artifact path (`mobile-automator/recordings/[scenario_name]/`).
    - The resolved environment, the mode, and the original `scenario_name`.
    - `overwrite_existing` (boolean) from Section 1.4 ŌĆö controls whether the skill archives the prior `mobile-automator/screenshots/<scenario_name>/` before moving new screenshots in.
    - `verify_on_save` (boolean) from Section 1.4 ŌĆö controls whether the skill invokes the executor skill against the freshly-written scenario after Save.
    - The selected device from Section 1.2 ŌĆö required by the executor skill when `verify_on_save = true`.
"""

description = "List all tags used across test scenarios with counts and descriptions"
prompt = """
## SYSTEM DIRECTIVE
You are launching the Mobile QA Tag Registry viewer. Your job is to scan the project's test scenarios, aggregate all used tags, and present them in a formatted registry.

---

## 1. PRE-FLIGHT CHECKS

1. Check if the `mobile-automator/scenarios` directory exists in the workspace.
   - If missing, or if it contains no `.json` files, halt and say:
     > "❌ No `mobile-automator/scenarios` directory found or no scenarios exist. Run `/mobile-automator:generate` to create your first scenario."

## 2. AGGREGATE TAGS

1. Read all `*.json` files inside `mobile-automator/scenarios/`.
2. For each file, parse the JSON and extract the `tags` array.
3. Keep a running count of how many times each tag is used.
4. Keep track of scenarios that have NO tags (or empty `tags` arrays).

## 3. PRESENT TAG REGISTRY

1. Group the found tags into two categories:
   - **Standard Tags:** Tags that match any of the following: `smoke`, `regression`, `critical`, `p0`, `p1`, `p2`, `fast`, `slow`, `flaky`, `wip`.
   - **Custom Tags:** Any other tags found.

2. Display the registry EXACTLY as formatted below, filling in the actual counts from your scan. Only show standard tags if they are actually used (count > 0).

```
📋 Tag Registry — mobile-automator/scenarios/

Standard Tags:
┌──────────────┬────────────┬─────────────────────────────────────────┐
│ Tag          │ Scenarios  │ Description                             │
├──────────────┼────────────┼─────────────────────────────────────────┤
[List standard tags here, e.g.,]
│ smoke        │ 5          │ Quick validation of critical paths      │
│ regression   │ 12         │ Full feature validation                 │
│ critical     │ 3          │ Business-critical flows                 │
│ p0           │ 2          │ Highest priority flows                  │
│ flaky        │ 1          │ Known flakiness (e.g. network/timing)   │
└──────────────┴────────────┴─────────────────────────────────────────┘

Custom Tags:
[List custom tags here, e.g.,]
│ auth         │ 7          │ (user-defined)                          │
│ checkout     │ 4          │ (user-defined)                          │

Untagged scenarios: [N]
[List top 3-5 untagged scenario names, e.g.,]
  • onboarding_flow
  • splash_screen
  • [more...]

💡 Tip: Run `/mobile-automator:execute --tag [tag]` to run specific tests.
```

**Standard Tag Descriptions Reference (for the table):**
- `smoke`: Quick validation of critical paths
- `regression`: Full feature validation
- `critical`: Business-critical flows
- `p0`, `p1`, `p2`: Priority levels based on business impact
- `fast`: Executes quickly (<2 minutes)
- `slow`: Long-running complex flows
- `flaky`: Known flakiness (e.g., network tests)
- `wip`: Work in progress / under development

3. Halt execution to wait for user input. Do not automatically proceed to execute scenarios.
"""

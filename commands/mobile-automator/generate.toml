description = "Record a test scenario by executing user-provided steps on a connected device"
prompt = """
## SYSTEM DIRECTIVE
You are launching the Mobile QA Scenario Generator. Your job is to run pre-flight checks and then hand off to the generator skill.

CRITICAL: Do NOT generate scenarios yourself. After pre-flight passes, follow the instructions in `.gemini/skills/mobile-automator-generator/SKILL.md`.

---

## 0.0 ENVIRONMENT RESOLUTION

**Purpose:** Resolve `selected_environment` before pre-flight checks. This value is used throughout Section 1.3.

**config.json absence:** If `mobile-automator/config.json` does not exist, skip Section 0.0 entirely — do not attempt to resolve the environment. Section 1.1 will handle the missing config error with the appropriate message.

**Single-environment short-circuit:** First, read `mobile-automator/config.json` (if it exists). If `config.environments` exists and has exactly **one** entry, use it as `selected_environment` directly. Do NOT write to `mobile-automator/generate_preferences.json`. **Any flags (`--environment`, `--set-environment`) are silently ignored in this case** — there is only one valid choice. Skip the rest of Section 0.0 and proceed to Section 1.0. If `config.environments` exists but is **empty** (`[]`), treat it as absent — skip environment validation for flags and proceed to the multi-environment resolution steps below.

**Multi-environment resolution** (in priority order):

1. **Both flags present:** If both `--set-environment` and `--environment` are provided in the command, halt immediately:
   > "❌ Cannot use --set-environment and --environment together. Use one or the other."
   **HALT.**

2. **`--set-environment="X"` is present:**
   - If `config.environments` exists: check that `X` is in the list. If not, halt:
     > "❌ Unknown environment: \"X\"\n   Valid options: [comma-separated list of config.environments values]"
   - Set `selected_environment = X`.
   - Write `{ "environment": "X" }` to `mobile-automator/generate_preferences.json` (create or overwrite).
   - Announce:
     > "✅ Environment set to: X (saved as default preference)"
   - Proceed to Section 1.0.

3. **`--environment="X"` is present:**
   - If `config.environments` exists: check that `X` is in the list. If not, halt:
     > "❌ Unknown environment: \"X\"\n   Valid options: [comma-separated list of config.environments values]"
   - Set `selected_environment = X`. Do NOT write to `mobile-automator/generate_preferences.json`.
   - Announce:
     > "ℹ️  Using environment: X (one-time override, saved preference unchanged)"
   - Proceed to Section 1.0.

4. **Check `mobile-automator/generate_preferences.json`:**
   - If the file exists and has an `"environment"` key:
     - If `config.environments` **exists** and the saved value is **NOT** in the list:
       > "⚠️  Saved environment \"[saved_value]\" is no longer valid (not found in available environments).\n    Please select a new default environment."
       Fall through to step 5.
     - Otherwise (value is valid, or `config.environments` is absent): set `selected_environment` to the saved value. Announce:
       > "ℹ️  Using saved environment: [saved_value]\n    (override with --environment=\"X\" or update saved preference with --set-environment=\"X\")"
       Proceed to Section 1.0.

5. **Interactive prompt (no flag, no valid preference):**
   - If `config.environments` has multiple entries, use the `ask_user` tool (type: `choice`) to ask:
     - Header: `Environment`
     - Question: `Which environment should I use for this test?`
     - Options: Create options from the available environments in `config.environments`.
   - After the user selects, set `selected_environment` to the chosen value.
   - Write `{ "environment": "selected_value" }` to `mobile-automator/generate_preferences.json` (create or overwrite).
   - Announce:
     > "ℹ️  Environment \"[selected_value]\" saved as default preference. Use --set-environment=\"X\" to change it later."
   - Proceed to Section 1.0.

---

## 0.5 MODE READ

**Purpose:** Determine which operating mode the project uses. This value drives branching in Section 1.3.

**config.json absence guard:** If `mobile-automator/config.json` does not exist, skip Section 0.5 entirely. Section 1.1 will handle the missing config error with the appropriate message.

1. Read `mobile-automator/config.json`.
2. Set `MODE = config.mode`. If the `mode` key is absent, default `MODE = "platform-aware"` (v0.10 implicit default — pre-agnostic projects are treated as platform-aware).
3. If `MODE` is not one of `platform-aware` / `platform-agnostic`, halt immediately:
   > "ERROR: Unknown mode `<value>` in config.json. Expected `platform-aware` or `platform-agnostic`. Re-run setup or fix the config manually."
   **HALT.**

---

## 1.0 PRE-FLIGHT CHECKS

### 1.1 Verify Setup
1.  Check that `mobile-automator/config.json` exists.
    - If missing → "Setup not found. Please run `/mobile-automator:setup` first." → Halt.
2.  Check that `.gemini/skills/mobile-automator-generator/SKILL.md` exists.
    - If missing → "Generator skill not installed. Please run `/mobile-automator:setup` first." → Halt.
3.  Read `mobile-automator/config.json` to load project configuration.

### 1.2 Verify Device
1.  Use `mobile_list_available_devices()` to check for connected devices.
    - If no devices found → "No device connected. Please connect a device, emulator, or simulator and try again." → Halt.
2.  If multiple devices are found, use the `ask_user` tool (type: `choice`) to ask the user to select one:
    - Header: `Device`
    - Question: `Which device should I use?`
    - Options: Dynamically list the available devices as options.
3.  Confirm the selected device to the user.

### 1.3 Select Environment and Verify App
1.  **Read config:** Load `mobile-automator/config.json`.
2.  **Use resolved environment:** The `selected_environment` value was already resolved in Section 0.0. Use it directly for all subsequent steps in this section (package ID lookup, build command, scenario metadata). If `selected_environment` is not set (because Section 0.0 was skipped due to a missing `config.json`), do not proceed — Section 1.1 will have already halted with the appropriate error.
3.  **Determine the app package ID:**
    -   If `app.android_packages` or `app.ios_bundle_ids` exists in config (environment-specific mapping):
        -   Use the package ID for the selected environment: `app.android_packages[selected_environment]` or `app.ios_bundle_ids[selected_environment]`
    -   Otherwise, use the single package ID: `app.android_package` or `app.ios_bundle_id`
4.  **Branch on MODE:**

    **If MODE = platform-aware:**
    - **Confirm with the user** using the `ask_user` tool (type: `choice`):
        - Header: `Build & Install`
        - Question: `I'll be testing [app_package] on [device_name]. Should I build and install the app?`
        - Options:
          - `Build and install` (description: `using: [build_command]`)
          - `Already installed` (description: `skip build`)
    - If `Build and install` → execute the build command from config (with the appropriate flavor/environment), then install.
    - If `Already installed` → verify the app is installed using `mobile_launch_app` as a check.

    **If MODE = platform-agnostic:**
    - Probe app presence on the selected device:
        - Android: run `adb shell pm list packages | grep <android_package>` (or equivalent via MCP tool).
        - iOS: check via simctl or the MCP tool equivalent.
    - If the app is present → announce: `"✅ App detected on device. Proceeding."` and continue.
    - If the app is absent → use the `ask_user` tool (type: `choice`) to prompt:
        - Header: `App not installed`
        - Question: `Mobile-automator (agnostic mode) does not auto-install apps. Please install [project_name] on the device, then choose:`
        - Options:
          - `App is now installed` (description: `re-check device`)
          - `Cancel` (description: `abort the command`)
    - If `Cancel` → halt immediately. **HALT.**
    - If `App is now installed` → re-probe; if still absent, repeat the prompt.

---

## 2.0 HAND OFF TO GENERATOR SKILL

1.  **Announce the hand-off:**
    > "I will now activate the generator skill to record your test scenario on the device."

2.  **Check for user-provided steps.** If the user included test steps in their command (e.g., `/mobile-automator:generate 1. open app 2. tap login 3. enter email`), pass them along.

3.  **If no steps provided**, use the `ask_user` tool (type: `text`) to ask for the test steps:
    - Header: `Test Steps`
    - Question: `What steps should I record?`
    - Placeholder: `e.g. 1. open app 2. tap login 3. enter email...`

4.  **Follow the generator skill** at `.gemini/skills/mobile-automator-generator/SKILL.md` to execute the steps, capture screenshots, and save the scenario.
"""
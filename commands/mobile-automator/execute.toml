description = "Execute saved test scenarios against a connected device and produce pass/fail reports"
prompt = """
## SYSTEM DIRECTIVE
You are launching the Mobile QA Scenario Executor. Your job is to run pre-flight checks, resolve which scenarios to execute, and then hand off to the executor skill.

CRITICAL: Do NOT execute scenarios yourself. After pre-flight passes, follow the instructions in `.gemini/skills/mobile-automator-executor/SKILL.md`.

---

## 1.0 PRE-FLIGHT CHECKS

### 1.1 Verify Setup
1.  Check that `mobile-automator/config.json` exists.
    - If missing → "Setup not found. Please run `/mobile-automator:setup` first." → Halt.
2.  Check that `.gemini/skills/mobile-automator-executor/SKILL.md` exists.
    - If missing → "Executor skill not installed. Please run `/mobile-automator:setup` first." → Halt.
3.  Read `mobile-automator/config.json` to load project configuration.

### 1.2 Verify Device
1.  Use `mobile_list_devices()` to check for connected devices.
    - If no devices found → "No device connected. Please connect a device, emulator, or simulator and try again." → Halt.
2.  If multiple devices are found, present the list and ask the user to select one:
    > "I found multiple devices:"
    > [list devices with index]
    > "Which device should I use?"
3.  Confirm the selected device to the user.

### 1.3 Verify App
1.  Read `app.android_package` or `app.ios_bundle_id` from config (based on the connected device platform).
2.  Confirm with the user:
    > "I'll be testing **[app_package]** on **[device_name]**."
    > "Should I build and install the app, or is it already installed?"
    >
    > A) Build and install (using: `[build_command]`)
    > B) Already installed, skip build
3.  If A → execute the build command from config, then install.
4.  If B → verify the app is installed using `mobile_launch_app` as a check.

---

## 2.0 SCENARIO SELECTION

### 2.1 Check Available Scenarios
1.  List all `.json` files in `mobile-automator/scenarios/`.
    - If none found → "No scenarios found. Please run `/mobile-automator:generate` first to create test scenarios." → Halt.

### 2.2 Resolve Which Scenarios to Execute
1.  **If the user specified scenarios** in the command (by name, ID, or tag), resolve them:
    - By name/ID: match against `scenario_id` in each JSON file.
    - By tag: filter scenarios whose `tags` array contains the specified tag (e.g., `smoke`, `regression`).
    - If no matches → "No scenarios found matching '[query]'. Available scenarios: [list]" → Halt.

2.  **If the user specified no scenarios**, present the available list:
    > "Available scenarios:"
    > [numbered list with scenario name, description, and tags]
    >
    > "Which scenarios should I execute?"
    >
    > A) All scenarios
    > B) Select by number (e.g., 1, 3, 5)
    > C) Filter by tag (e.g., `smoke`)

3.  Confirm the final selection:
    > "I'll execute the following [N] scenario(s):"
    > [list selected scenario names]
    > "Proceed?"

---

## 3.0 HAND OFF TO EXECUTOR SKILL

1.  **Pass the resolved scenario list and device context** to the executor skill.
2.  **Follow the executor skill** at `.gemini/skills/mobile-automator-executor/SKILL.md` to replay steps, validate assertions, and generate the result report.
"""
# ============================================================================
# AGNOSTIC FLOW (§§ A.1–A.7) — runs when selected_mode = "platform-agnostic"
# ============================================================================

### A.1 — Project Basics

**PROTOCOL:** Gather project name and (optionally) Android applicationId and iOS Bundle ID. Either, both, or neither may be provided.

1. **Project name:**
   - Auto-detect: try `package.json` `name`, `pubspec.yaml` `name`, root build file's project name, or the directory basename.
   - Confirm with `ask_user` (type: `text`, default: detected value).
   - Persist to `setup_state.knowledge.project_name`.

2. **Android applicationId (optional):**
   - Auto-detect: scan `android/app/build.gradle*`, `composeApp/build.gradle.kts`, or root `build.gradle*` for `applicationId`.
   - Use `ask_user` (type: `text`, allow blank) to confirm or enter manually.
   - Persist to `setup_state.app.android_package` (or null if blank).

3. **iOS Bundle ID (optional):**
   - Auto-detect: read `PRODUCT_BUNDLE_IDENTIFIER` from `*.xcodeproj/project.pbxproj` or `Info.plist`.
   - Use `ask_user` (type: `text`, allow blank).
   - Persist to `setup_state.app.ios_bundle_id` (or null if blank).

4. Persist `setup_state.json` with `last_successful_step: "A.1"`.

### A.2 — Business Knowledge

**PROTOCOL:** Capture the project's domain and the user flows that are critical for QA.

1. **Business domain:**
   - Try to extract from `README.md`, app store description, or app `displayName`.
   - Use `ask_user` (type: `text`) to confirm a one-sentence description.
   - Persist to `setup_state.knowledge.business_domain`.

2. **Business-critical paths:**
   - Use `ask_user` (type: `text`) with placeholder `e.g., onboarding, login, checkout, payment`.
   - Parse comma-separated input into an array.
   - Persist to `setup_state.knowledge.business_critical_paths` (joined with commas for the placeholder substitution).

3. Persist `setup_state.json` with `last_successful_step: "A.2"`.

### A.3 — Loading Indicators (Semantic Descriptions)

**PROTOCOL:** Capture how loading appears in the app, in plain English. Unlike platform-aware mode (which collects class names like `CircularProgressIndicator`), agnostic mode captures **semantic descriptions** so the AI can identify loading visually regardless of platform.

1. Use `ask_user` (type: `text`) with the prompt:
   > "Describe what loading looks like in your app, in plain English. Examples:
   > - `a centered spinner overlay during full-screen loads`
   > - `shimmer placeholders for cards on the home screen`
   > - `a small spinner inside the Login button while authenticating`"
2. Persist user's input verbatim to `setup_state.knowledge.loading_indicators`.
3. Persist `setup_state.json` with `last_successful_step: "A.3"`.

### A.4 — Protected Directories

**PROTOCOL:** Capture source directories that should NEVER be modified by mobile-automator (the skill operates on test artifacts, not source code).

1. **Auto-detect candidates:**
   - Common patterns: `app/src/main/`, `ios/`, `lib/`, `src/`, `composeApp/src/`.
   - Build a default list from directories that exist in the project.

2. Use `ask_user` (type: `text`, default: detected list joined with commas) to confirm.

3. Persist to `setup_state.knowledge.protected_directories`.

4. Persist `setup_state.json` with `last_successful_step: "A.4"`.

### A.5 — Environments (Optional)

**PROTOCOL:** Capture named environments (production, staging, dev). In agnostic mode, environments are decoupled from build flavors — they're just labels for the test target.

1. Use `ask_user` (type: `choice`):
   - Header: `Environments`
   - Question: `Does your project have named environments (e.g., production, staging, dev)?`
   - Options: `Yes` / `No`

2. If `Yes`:
   - Use `ask_user` (type: `text`) with placeholder `e.g., production, staging, dev`.
   - Parse comma-separated input into an array.
   - Persist to `setup_state.environments`.
   - Use `ask_user` (type: `choice`) for the default environment.
   - Persist to `setup_state.default_environment`.

3. If `No`:
   - Set `setup_state.environments = []` and `setup_state.default_environment = null`.

4. Persist `setup_state.json` with `last_successful_step: "A.5"`.

### A.6 — Skill Installation (Agnostic)

**PROTOCOL:** Install the agnostic-mode skills by invoking the deterministic Node.js script with `--mode=platform-agnostic`.

1. **Persist `selected_mode` into `setup_state.json`** if not already present (it should be from § 1.5):
   ```json
   { "selected_mode": "platform-agnostic" }
   ```

2. **Invoke the installer:**
   - First, try running:
     ```
     node ~/.gemini/extensions/mobile-automator/scripts/install-skills.js --mode=platform-agnostic
     ```
   - If the command fails because the script file does not exist:
     - Read `~/.gemini/extensions/mobile-automator/.gemini-extension-install.json`.
     - If the JSON contains a `path` or `localPath` field, try:
       ```
       node <path_value>/scripts/install-skills.js --mode=platform-agnostic
       ```
     - If neither path works, announce:
       > "Skill installation script not found. Please update the extension: `gemini extensions install https://github.com/sh3lan93/mobile-automator`"
       **HALT.**

3. **Verify success:**
   - `.gemini/skills/mobile-automator-generator/SKILL.md` exists, no `{{` remaining.
   - `.gemini/skills/mobile-automator-executor/SKILL.md` exists, no `{{` remaining.
   - `.gemini/skills/references/platform-resolutions.md` exists.
   - `.gemini/skills/references/mobile-mcp-tools.md` exists.

4. If the script exits non-zero, surface the error to the user and halt — do NOT continue to § A.7.

5. Persist `setup_state.json` with `last_successful_step: "A.6"`.
"""